name: Build and Release Core APK

on:
  push:
    branches: [main]
    paths:
      - 'app/**'
      - 'build.gradle.kts'
      - 'gradle/**'
      - 'plugins/**'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: 'platforms;android-36 build-tools;36.0.0'

      - name: Install Kotlin compiler
        run: |
          KOTLIN_VERSION=2.3.0
          curl -fsSL "https://github.com/JetBrains/kotlin/releases/download/v${KOTLIN_VERSION}/kotlin-compiler-${KOTLIN_VERSION}.zip" -o kotlin.zip
          unzip -q kotlin.zip
          echo "$PWD/kotlinc/bin" >> $GITHUB_PATH
          # Non-embeddable Compose compiler plugin — compatible with standalone kotlinc
          COMPOSE_JAR="$PWD/kotlinc/lib/compose-compiler-plugin.jar"
          curl -fsSL "https://repo1.maven.org/maven2/org/jetbrains/kotlin/kotlin-compose-compiler-plugin/${KOTLIN_VERSION}/kotlin-compose-compiler-plugin-${KOTLIN_VERSION}.jar" \
            -o "$COMPOSE_JAR"
          echo "COMPOSE_COMPILER_PLUGIN=$COMPOSE_JAR" >> $GITHUB_ENV

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Decode keystore
        run: echo "${{ secrets.SIGNING_KEY_BASE64 }}" | base64 -d > /tmp/oneapp.jks

      - name: Build signed release APK
        env:
          GITHUB_REPOSITORY: ${{ github.repository }}
          GH_READ_TOKEN: ${{ secrets.GH_READ_TOKEN }}
          SIGNING_KEYSTORE_PATH: /tmp/oneapp.jks
          SIGNING_KEY_ALIAS: ${{ secrets.SIGNING_KEY_ALIAS }}
          SIGNING_KEY_STORE_PASSWORD: ${{ secrets.SIGNING_KEY_STORE_PASSWORD }}
          SIGNING_KEY_PASSWORD: ${{ secrets.SIGNING_KEY_PASSWORD }}
        run: ./gradlew :app:assembleRelease

      - name: Build stubs and plugin classpath
        run: ./gradlew :build-stubs:jar :app:writePluginClasspath

      - name: Compile all own plugins
        run: |
          mkdir -p out
          shopt -s nullglob
          for kt_file in plugins/*.kt; do
            plugin_id=$(basename "$kt_file" .kt)
            echo "Compiling $kt_file as $plugin_id"
            bash scripts/compile-plugin.sh "$kt_file" "$plugin_id"
          done

      - name: Generate version info
        id: version
        run: |
          CODE=$(./gradlew -q :app:printVersionCode 2>/dev/null || echo "1")
          NAME=$(./gradlew -q :app:printVersionName 2>/dev/null || echo "1.0.0")
          echo "code=$CODE" >> $GITHUB_OUTPUT
          echo "name=$NAME" >> $GITHUB_OUTPUT
          echo "{\"versionCode\": $CODE, \"versionName\": \"$NAME\"}" > core-version.json

      - name: Publish APK and plugins to stable release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: stable
          name: "Stable Plugins"
          files: |
            app/build/outputs/apk/release/*.apk
            core-version.json
            out/*.dex
