name: Build and Release Core APK

on:
  push:
    branches: [main]
    paths:
      - 'app/**'
      - 'build.gradle.kts'
      - 'gradle/**'
  workflow_dispatch:
    inputs:
      release:
        description: 'Publish as stable release'
        type: boolean
        default: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: 'platforms;android-36 build-tools;36.0.0'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Decode keystore
        run: echo "${{ secrets.SIGNING_KEY_BASE64 }}" | base64 -d > /tmp/oneapp.jks

      - name: Build signed release APK
        env:
          GITHUB_REPOSITORY: ${{ github.repository }}
          GH_READ_TOKEN: ${{ secrets.GH_READ_TOKEN }}
          SIGNING_KEYSTORE_PATH: /tmp/oneapp.jks
          SIGNING_KEY_ALIAS: ${{ secrets.SIGNING_KEY_ALIAS }}
          SIGNING_KEY_STORE_PASSWORD: ${{ secrets.SIGNING_KEY_STORE_PASSWORD }}
          SIGNING_KEY_PASSWORD: ${{ secrets.SIGNING_KEY_PASSWORD }}
        run: ./gradlew :app:assembleRelease

      - name: Generate version info
        id: version
        run: |
          CODE=$(./gradlew -q :app:printVersionCode 2>/dev/null || echo "1")
          NAME=$(./gradlew -q :app:printVersionName 2>/dev/null || echo "1.0.0")
          echo "code=$CODE" >> $GITHUB_OUTPUT
          echo "name=$NAME" >> $GITHUB_OUTPUT
          echo "{\"versionCode\": $CODE, \"versionName\": \"$NAME\"}" > core-version.json

      - name: Publish stable release
        if: github.event_name == 'workflow_dispatch' && inputs.release == true
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "core-v${{ steps.version.outputs.name }}"
          name: "Core APK v${{ steps.version.outputs.name }}"
          files: |
            app/build/outputs/apk/release/*.apk
            core-version.json
