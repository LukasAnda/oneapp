name: Evolve

on:
  issues:
    types: [labeled]
  issue_comment:
    types: [created]

jobs:
  evolve:
    # Trigger on 'evolve' label OR when the repo owner comments on any open issue
    if: |
      (github.event_name == 'issues' && github.event.label.name == 'evolve') ||
      (github.event_name == 'issue_comment' && github.event.comment.user.login == github.repository_owner && github.event.issue.state == 'open')
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: 'platforms;android-36 build-tools;36.0.0'

      - name: Install Kotlin compiler
        run: |
          KOTLIN_VERSION=2.3.0
          curl -fsSL "https://github.com/JetBrains/kotlin/releases/download/v${KOTLIN_VERSION}/kotlin-compiler-${KOTLIN_VERSION}.zip" -o kotlin.zip
          unzip -q kotlin.zip
          echo "$PWD/kotlinc/bin" >> $GITHUB_PATH
          # Download the NON-embeddable Compose compiler plugin — required for standalone kotlinc.
          # The -embeddable variant uses shaded org.jetbrains.kotlin.com.intellij.* class names
          # that don't exist in the standalone kotlin-compiler.jar (only in kotlin-compiler-embeddable.jar).
          COMPOSE_JAR="$PWD/kotlinc/lib/compose-compiler-plugin.jar"
          curl -fsSL "https://repo1.maven.org/maven2/org/jetbrains/kotlin/kotlin-compose-compiler-plugin/${KOTLIN_VERSION}/kotlin-compose-compiler-plugin-${KOTLIN_VERSION}.jar" \
            -o "$COMPOSE_JAR"
          echo "COMPOSE_COMPILER_PLUGIN=$COMPOSE_JAR" >> $GITHUB_ENV

      - name: Setup Gradle and build stubs + plugin classpath
        uses: gradle/actions/setup-gradle@v3
      - run: ./gradlew :build-stubs:jar :app:writePluginClasspath

      - name: Install Python dependencies
        run: pip install -r scripts/requirements.txt

      - name: Write issue body and comment to files
        env:
          ISSUE_BODY: ${{ github.event.issue.body }}
          COMMENT_BODY: ${{ github.event.comment.body }}
        run: |
          echo "$ISSUE_BODY" > /tmp/issue_body.txt
          echo "$COMMENT_BODY" > /tmp/comment_body.txt

      - name: Run evolution agent
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          ISSUE_TITLE: ${{ github.event.issue.title }}
          EVENT_NAME: ${{ github.event_name }}
        run: python3 scripts/evolve_agent.py

      # Compilation is handled inside evolve_agent.py with up to 3 retries.
      # The agent writes the DEX to out/ directly; this step is a no-op kept for clarity.

      - name: Publish DEX to GitHub Releases (stable tag)
        if: hashFiles('out/*.dex') != ''
        uses: softprops/action-gh-release@v2
        with:
          tag_name: stable
          name: "Stable Plugins"
          files: out/*.dex

      - name: Commit manifest, journal, and any manifest permission changes
        run: |
          git config user.name "oneapp-agent"
          git config user.email "agent@oneapp.dev"
          git add MANIFEST.md JOURNAL.md plugins/ app/src/main/AndroidManifest.xml || true
          git diff --staged --quiet || git commit -m "evolve(#${{ github.event.issue.number }}): ${{ github.event.issue.title }}"
          git push

      - name: Comment on issue
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const comment = fs.existsSync('/tmp/agent_comment.txt')
              ? fs.readFileSync('/tmp/agent_comment.txt', 'utf8')
              : 'Evolution complete. Plugin will be available on next app launch.';
            github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: ${{ github.event.issue.number }},
              body: comment,
            });
